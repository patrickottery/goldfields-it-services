<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
  <div id="navbar-placeholder"></div>

  <main>
    <section id="contact" class="bg-light py-5">
      <div class="container">
        <p class="kicker text-center">Get in touch</p>
        <h2 class="text-center mb-5">Contact</h2>
        <div class="row justify-content-center">
          <div class="col-lg-7">
            <div class="contact-card">
              <p><i class="bi bi-telephone-fill me-2" aria-hidden="true"></i> <a href="tel:+61421603967">+61 421 603 967</a></p>
              <p><i class="bi bi-envelope-fill me-2" aria-hidden="true"></i> <a href="mailto:patrick@goldfieldsitservices.net">patrick@goldfieldsitservices.net</a></p>

                <!-- To update: Google Maps → search your area → Share → Embed a map → copy the iframe src -->

                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5062620!2d143.74!3d-36.95!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad2f3b378cf2c3f%3A0x5045671028e69e6e!2sCentral%20Goldfields%20Victoria!5e0!3m2!1sen!2sau!4v1630000000000"
                  width="100%"
                  height="220"
                  style="border:0;"
                  allowfullscreen=""
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  title="Service area: Central Goldfields and Central Victoria"></iframe>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  <div id="footer-placeholder"></div>
